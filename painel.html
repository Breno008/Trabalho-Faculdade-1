<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — GameVault</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a href="index.html" class="logo">🎮 GameVault</a>
      <nav>
        <a href="index.html">Catálogo</a>
        <a href="painel.html" class="active">Painel</a>
      </nav>
    </div>
  </header>

  <main class="container panel">
    <h1>Gerenciador de Jogos</h1>
    <p class="muted">Cadastre, atualize e remova jogos</p>

    <section class="card-form">
      <h2 id="form-title">Cadastrar Jogo</h2>
      <form id="form-jogo">
        <input type="hidden" id="jogo-id" />
        <div class="row">
          <label>Título<input type="text" id="titulo" required /></label>
          <label>Plataforma<input type="text" id="plataforma" /></label>
        </div>
        <div class="row">
          <label>Gênero<input type="text" id="genero" /></label>
          <label>Ano<input type="number" id="ano" /></label>
          <label>Nota<input type="number" step="0.1" id="nota" /></label>
        </div>
        <label>Descrição<textarea rows="3" id="descricao"></textarea></label>
        <div class="actions">
          <button type="submit" class="btn-primary" id="btn-salvar">Salvar</button>
          <button type="button" class="btn-ghost" id="btn-cancelar">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="card-form">
      <h2>Jogos cadastrados</h2>
      <table class="table">
        <thead>
          <tr>
            <th>Título</th><th>Plataforma</th><th>Gênero</th>
            <th>Ano</th><th>Nota</th><th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-jogos">
          <tr><td colspan="6" class="muted">Carregando...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 GameVault</p>
    </div>
  </footer>

  <script src="painel.js"></script>
</body>
</html>
