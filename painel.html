<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Jogos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Gerenciador de Jogos</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="painel.html">Painel</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Cadastrar jogo</h2>

      <form>
        <label>Nome do jogo:</label>
        <input type="text" placeholder="Digite o nome">

        <label>Gênero:</label>
        <input type="text" placeholder="Digite o gênero">

        <label>Plataforma:</label>
        <input type="text" placeholder="Digite a plataforma">

        <label>Nota:</label>
        <input type="number" placeholder="Ex: 9.5">
       
        <button type="submit">Cadastrar</button>
      </form>
    </section>

    <section>
      <h2>Jogos cadastrados</h2>

      <table>
        <tr>
          <th>Nome</th>
          <th>Gênero</th>
          <th>Plataforma</th>
          <th>Nota</th>
          <th>Ações</th>
        </tr>
        <tr>
          <td>Minecraft</td>
          <td>Sandbox</td>
          <td>PC / Console / Mobile</td>
          <td>9.5</td>
          <td>
            <button>Editar</button>
            <button>Excluir</button>
          </td>
        </tr>
        <tr>
          <td>Free Fire</td>
          <td>Battle Royale</td>
          <td>Mobile</td>
          <td>6.0</td>
          <td>
              <button>Editar</button>
              <button>Excluir</button>
          </td>
        </tr>
        <tr>
          <td>EA FC 26</td>
          <td>Esporte</td>
          <td>PC / Console</td>
          <td>8.0</td>
          <td>
            <button>Editar</button>
            <button>Excluir</button>
          </td>
        </tr>
        <tr>
          <td>GTA V</td>
          <td>Ação</td>
          <td>PC / Console</td>
          <td>9.0</td>
          <td>
            <button>Editar</button>
            <button>Excluir</button>
          </td>
        </tr>
        <tr>
      </table>
    </section>
  </main>

</body>
</html>
